<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Shock Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* scanlines overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 180, 0.015) 2px,
        rgba(0, 255, 180, 0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      color: #00ffcc44;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 3rem;
      z-index: 1;
    }

    /* ── SHOCK BUTTON ── */
    .shock-btn {
      position: relative;
      z-index: 1;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      font-weight: normal;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00ffcc;
      background: transparent;
      border: 2px solid #00ffcc;
      padding: 20px 60px;
      cursor: pointer;
      outline: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: color 0.12s, background 0.12s;
      user-select: none;
    }

    /* glow border pulse on idle */
    .shock-btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      background: transparent;
      border: 2px solid #00ffcc;
      opacity: 0;
      animation: idle-pulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes idle-pulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(1.04); }
    }

    .shock-btn:hover {
      color: #001a14;
      background: #00ffcc;
      text-shadow: none;
      box-shadow:
        0 0 8px  #00ffcc,
        0 0 24px #00ffccaa,
        0 0 60px #00ffcc44;
    }

    .shock-btn:hover::before { animation: none; opacity: 0; }

    .shock-btn:active { transform: scale(0.96); }

    /* shake on click */
    .shock-btn.zapped {
      animation: zap-shake 0.4s ease forwards;
    }

    @keyframes zap-shake {
      0%   { transform: translate(0,0)     rotate(0deg);   }
      10%  { transform: translate(-5px,3px)  rotate(-2deg);  }
      20%  { transform: translate(5px,-3px)  rotate(2deg);   }
      30%  { transform: translate(-4px,2px)  rotate(-1.5deg);}
      40%  { transform: translate(4px,-2px)  rotate(1.5deg); }
      55%  { transform: translate(-2px,1px)  rotate(-0.8deg);}
      70%  { transform: translate(2px,-1px)  rotate(0.8deg); }
      85%  { transform: translate(-1px,0px);                 }
      100% { transform: translate(0,0)     rotate(0deg);   }
    }

    /* corner decorations */
    .corner { position: absolute; width: 10px; height: 10px; border-color: #00ffcc; border-style: solid; transition: opacity 0.2s; opacity: 0.4; }
    .shock-btn:hover .corner { opacity: 1; }
    .corner.tl { top:-5px;    left:-5px;  border-width: 2px 0 0 2px; }
    .corner.tr { top:-5px;    right:-5px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom:-5px; left:-5px;  border-width: 0 0 2px 2px; }
    .corner.br { bottom:-5px; right:-5px; border-width: 0 2px 2px 0; }

    /* ── CANVAS ── */
    #sparks {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* subtitle */
    .hint {
      margin-top: 2.5rem;
      color: #00ffcc33;
      font-size: 11px;
      letter-spacing: 3px;
      z-index: 1;
    }
  </style>
</head>
<body>

  <h1>// electric shock button</h1>

  <button class="shock-btn" id="btn">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    ⚡ CHOQUE ⚡
  </button>

  <p class="hint">[ passe o mouse · clique para chocar ]</p>

  <canvas id="sparks"></canvas>

  <script>
    const canvas = document.getElementById('sparks');
    const ctx    = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Particle types ── */
    function addSparks(x, y, n) {
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        const colors = ['#00ffcc','#ffffff','#aaffee','#ffff88','#00ff88'];
        particles.push({
          type: 'spark',
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          decay: 0.022 + Math.random() * 0.03,
          size: 2 + Math.random() * 3.5,
          color: colors[Math.floor(Math.random() * colors.length)],
          trail: []
        });
      }
    }

    function addBolt(ox, oy) {
      /* branching lightning bolt from point */
      for (let b = 0; b < 5; b++) {
        const baseAngle = -Math.PI / 2 + (Math.random() - 0.5) * 2.2;
        const pts = [{ x: ox, y: oy }];
        let cx = ox, cy = oy;
        const segs = 6 + Math.floor(Math.random() * 6);
        for (let s = 0; s < segs; s++) {
          cx += Math.cos(baseAngle) * (14 + Math.random() * 12) + (Math.random() - 0.5) * 34;
          cy += Math.sin(baseAngle) * (14 + Math.random() * 12) + (Math.random() - 0.5) * 22;
          pts.push({ x: cx, y: cy });
        }
        particles.push({
          type: 'bolt',
          pts,
          life: 1,
          decay: 0.09 + Math.random() * 0.06,
          width: 1 + Math.random() * 1.5
        });
      }
    }

    function addRing(x, y) {
      particles.push({ type: 'ring', x, y, r: 4, maxR: 90, life: 1, decay: 0.04 });
    }

    /* ── Render loop ── */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);

      for (const p of particles) {

        if (p.type === 'bolt') {
          ctx.save();
          ctx.globalAlpha = p.life * 0.9;
          ctx.strokeStyle = '#00ffcc';
          ctx.lineWidth   = p.width * p.life;
          ctx.shadowColor = '#00ffcc';
          ctx.shadowBlur  = 12;
          ctx.beginPath();
          p.pts.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
          ctx.stroke();
          /* inner white core */
          ctx.globalAlpha = p.life * 0.5;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth   = p.width * p.life * 0.4;
          ctx.shadowBlur  = 0;
          ctx.stroke();
          ctx.restore();
          p.life -= p.decay;
          continue;
        }

        if (p.type === 'ring') {
          ctx.save();
          ctx.globalAlpha = p.life * 0.6;
          ctx.strokeStyle = '#00ffcc';
          ctx.lineWidth   = 1.5;
          ctx.shadowColor = '#00ffcc';
          ctx.shadowBlur  = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          p.r    += (p.maxR - p.r) * 0.12;
          p.life -= p.decay;
          continue;
        }

        /* spark */
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 7) p.trail.shift();

        if (p.trail.length > 1) {
          ctx.save();
          ctx.globalAlpha = p.life * 0.25;
          ctx.strokeStyle = p.color;
          ctx.lineWidth   = p.size * 0.5;
          ctx.beginPath();
          p.trail.forEach((t, i) => i === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y));
          ctx.stroke();
          ctx.restore();
        }

        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.18;
        p.vx *= 0.97;
        p.life -= p.decay;
      }

      requestAnimationFrame(draw);
    }
    draw();

    /* ── Button click ── */
    const btn = document.getElementById('btn');

    btn.addEventListener('click', function () {
      /* shake */
      btn.classList.remove('zapped');
      void btn.offsetWidth; /* reflow to restart animation */
      btn.classList.add('zapped');
      btn.addEventListener('animationend', () => btn.classList.remove('zapped'), { once: true });

      /* burst from multiple points on the button */
      const rect = btn.getBoundingClientRect();
      const points = [
        { x: rect.left + rect.width * 0.5, y: rect.top  },            /* top center */
        { x: rect.left + rect.width * 0.2, y: rect.top  + 10 },
        { x: rect.left + rect.width * 0.8, y: rect.top  + 10 },
        { x: rect.left + rect.width * 0.5, y: rect.bottom },           /* bottom center */
        { x: rect.left + rect.width * 0.5, y: rect.top + rect.height / 2 }, /* mid */
      ];

      points.forEach((pt, i) => {
        setTimeout(() => {
          addSparks(pt.x, pt.y, 22);
          addBolt(pt.x, pt.y);
          if (i === 0) addRing(pt.x, pt.y);
        }, i * 45);
      });
    });

    /* hover sparks (subtle) */
    btn.addEventListener('mouseenter', function () {
      const rect = btn.getBoundingClientRect();
      addSparks(rect.left + rect.width / 2, rect.top, 6);
    });
  </script>
</body>
</html>
